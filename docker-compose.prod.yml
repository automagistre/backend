services:
  backend:
    image: ${HARBOR_REGISTRY}/automagistre/backend:${TAG:-latest}
    pull_policy: always
    restart: always
    env_file:
      - .env
    networks:
      - traefik-public
    # Keycloak резолвится через AdGuard (rewrite на локальный IP);
    # статическая запись убирает зависимость от DNS (EAI_AGAIN при сбоях AdGuard)
    extra_hosts:
      - "sso.automagistre.ru:192.168.55.30"
    volumes:
      - /srv/call-recordings:/call-recordings
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.automagistre-backend.rule=Host(`crm.automagistre.ru`) && PathPrefix(`/api`)"
      - "traefik.http.routers.automagistre-backend.priority=15"
      - "traefik.http.routers.automagistre-backend.entrypoints=websecure"
      - "traefik.http.routers.automagistre-backend.tls=true"
      - "traefik.http.routers.automagistre-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.automagistre-backend.loadbalancer.server.port=3000"

networks:
  traefik-public:
    external: true
